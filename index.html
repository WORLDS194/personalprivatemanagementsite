<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Whimsy Me!</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* Whimsical Access Screen Layout */
        .setup-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            background: radial-gradient(circle, #1a1a2e 0%, #121212 100%);
        }

        .setup-box {
            max-width: 500px;
            background-color: #1e1e24;
            border: 2px dashed #ff4a4a;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }

        h1 {
            color: #ff4a4a;
            font-size: 32px;
            margin-top: 0;
            letter-spacing: -0.5px;
        }

        p {
            color: #b3b3b3;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Styled Upload Button */
        .file-label {
            display: inline-block;
            background-color: #ff4a4a;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(255, 74, 74, 0.3);
        }

        .file-label:hover {
            background-color: #e03838;
            transform: translateY(-2px);
        }

        input[type="file"] {
            display: none;
        }

        /* Reset Button (Hidden in bottom corner for site control) */
        #resetBtn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #888;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            z-index: 9999;
        }
        
        #resetBtn:hover {
            background: #ff4a4a;
            color: white;
        }

        /* The Full-Screen Viewport */
        #contentViewer {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Access Request View -->
    <div id="setupScreen" class="setup-container">
        <div class="setup-box">
            <h1>Oops! Whimsy Me!</h1>
            <p>You don't have access. You need an onn disk drive with a folder named Management and index.html inside it to technically own the site.</p>
            
            <label class="file-label">
                Upload index.html
                <input type="file" id="fileImporter" accept=".html" onchange="handleFileImport(this)">
            </label>
        </div>
    </div>

    <!-- Hidden control to wipe the space -->
    <button id="resetBtn" onclick="clearStoredSite()">Reset Domain</button>

    <!-- Content Target -->
    <iframe id="contentViewer" title="Whimsy Me Custom View"></iframe>

    <script>
        // Check local storage immediately when the visitor arrives
        window.onload = function() {
            const savedHTML = localStorage.getItem('userManagementSite');
            if (savedHTML) {
                renderSite(savedHTML);
            }
        };

        // Reads the file when imported
        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const htmlContent = e.target.result;
                
                // Save it right inside the user's browser cache
                localStorage.setItem('userManagementSite', htmlContent);
                
                // Switch the viewport instantly
                renderSite(htmlContent);
            };
            reader.readAsText(file);
        }

        // Switches view from default text to the uploaded site
        function renderSite(htmlData) {
            const setupScreen = document.getElementById('setupScreen');
            const viewer = document.getElementById('contentViewer');
            const resetBtn = document.getElementById('resetBtn');

            setupScreen.style.display = 'none';
            viewer.style.display = 'block';
            resetBtn.style.display = 'block'; // Show reset switch once content is active
            
            const doc = viewer.contentDocument || viewer.contentWindow.document;
            doc.open();
            doc.write(htmlData);
            doc.close();
        }

        // Clears out local storage so they can start fresh
        function clearStoredSite() {
            if (confirm("Are you sure you want to release ownership of this domain?")) {
                localStorage.removeItem('userManagementSite');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
