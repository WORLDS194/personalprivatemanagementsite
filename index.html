<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brody Management</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* Access screen container */
        .setup-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .setup-box {
            max-width: 500px;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ff4a4a;
            font-size: 24px;
            margin-top: 0;
        }

        p {
            color: #b3b3b3;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 25px;
        }

        /* Styling the file input to look like a clean button */
        .file-label {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-label:hover {
            background-color: #0056b3;
        }

        input[type="file"] {
            display: none; /* Hide the ugly default browser file input */
        }

        /* The full-screen viewport display */
        #contentViewer {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Access Request View (Shows only if no file is stored locally) -->
    <div id="setupScreen" class="setup-container">
        <div class="setup-box">
            <h1>Access Required</h1>
            <p>You don't have access. You need an onn disk drive with a folder named Management and index.html inside it to technically own the site.</p>
            
            <label class="file-label">
                Import index.html
                <input type="file" id="fileImporter" accept=".html" onchange="handleFileImport(this)">
            </label>
        </div>
    </div>

    <!-- Container where their private index.html will safely render -->
    <iframe id="contentViewer" title="Management Panel"></iframe>

    <script>
        // On page load, immediately check if this user already imported a file previously
        window.onload = function() {
            const savedHTML = localStorage.getItem('userManagementSite');
            if (savedHTML) {
                renderSite(savedHTML);
            }
        };

        // Handles reading and saving the file when they click the button
        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const htmlContent = e.target.result;
                
                // Save the content directly to the user's browser storage
                localStorage.setItem('userManagementSite', htmlContent);
                
                // Render it instantly
                renderSite(htmlContent);
            };
            reader.readAsText(file);
        }

        // Injects the saved HTML into the full-screen iframe
        function renderSite(htmlData) {
            const setupScreen = document.getElementById('setupScreen');
            const viewer = document.getElementById('contentViewer');

            setupScreen.style.display = 'none';
            viewer.style.display = 'block';
            
            const doc = viewer.contentDocument || viewer.contentWindow.document;
            doc.open();
            doc.write(htmlData);
            doc.close();
        }
    </script>
</body>
</html>
